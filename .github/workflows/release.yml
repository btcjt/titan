name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Run tests
        run: cargo test --workspace

      - name: Write updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          # GitHub Secrets may add trailing whitespace/newlines. Strip them
          # so the base64-encoded minisign key parses cleanly. Write to a
          # file and use TAURI_SIGNING_PRIVATE_KEY as a path — tauri build
          # accepts either a literal key or a path to one.
          KEY_DIR="${RUNNER_TEMP:-/tmp}"
          KEY_PATH="$KEY_DIR/titan-updater.key"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_SECRET" | tr -d '[:space:]' > "$KEY_PATH"
          echo "wrote key to $KEY_PATH, $(wc -c < "$KEY_PATH") bytes"
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_PATH" >> $GITHUB_ENV

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/msi/*.msi.sig

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES="Titan ${GITHUB_REF_NAME}"

          # Find each platform's updater artifact + signature
          MAC_ARM_TAR=$(find artifacts -name "*.app.tar.gz" -path "*aarch64-apple-darwin*" | head -1)
          MAC_ARM_SIG=$(find artifacts -name "*.app.tar.gz.sig" -path "*aarch64-apple-darwin*" | head -1)
          LINUX_APPIMAGE=$(find artifacts -name "*.AppImage" | head -1)
          LINUX_SIG=$(find artifacts -name "*.AppImage.sig" | head -1)
          WIN_NSIS=$(find artifacts -name "*.exe" -path "*nsis*" | head -1)
          WIN_SIG=$(find artifacts -name "*.exe.sig" -path "*nsis*" | head -1)

          read_sig() {
            if [ -f "$1" ]; then cat "$1"; else echo ""; fi
          }

          MAC_ARM_SIG_CONTENT=$(read_sig "$MAC_ARM_SIG")
          LINUX_SIG_CONTENT=$(read_sig "$LINUX_SIG")
          WIN_SIG_CONTENT=$(read_sig "$WIN_SIG")

          MAC_ARM_NAME=$(basename "$MAC_ARM_TAR")
          LINUX_NAME=$(basename "$LINUX_APPIMAGE")
          WIN_NAME=$(basename "$WIN_NSIS")

          BASE_URL="https://github.com/btcjt/titan/releases/download/${GITHUB_REF_NAME}"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG_CONTENT}",
                "url": "${BASE_URL}/${MAC_ARM_NAME}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG_CONTENT}",
                "url": "${BASE_URL}/${LINUX_NAME}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG_CONTENT}",
                "url": "${BASE_URL}/${WIN_NAME}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            latest.json
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
