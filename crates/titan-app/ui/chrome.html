<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan</title>
  <link rel="stylesheet" href="chrome.css">
</head>
<body>
  <div id="toolbar">
    <button id="btn-back" title="Back" disabled>&#x2190;</button>
    <button id="btn-forward" title="Forward" disabled>&#x2192;</button>
    <button id="btn-refresh" title="Refresh">&#x21BB;</button>
    <div id="address-bar-container">
      <span id="scheme-badge">nsite://</span>
      <input
        id="address-bar"
        type="text"
        spellcheck="false"
        autocomplete="off"
        placeholder="enter a name or npub..."
      >
    </div>
    <button id="btn-star" title="Bookmark (Cmd+D)">&#x2606;</button>
    <button id="btn-bookmarks" title="Bookmarks">&#x2261;</button>
    <button id="btn-console" title="Console (Cmd+Opt+K)" style="font-size:12px;display:none;">&#x2699;</button>
  </div>
  <div id="loading-bar"></div>

  <!-- Side panel -->
  <div id="side-panel" style="display:none;">
    <div id="panel-header">
      <span id="panel-title"></span>
    </div>
    <div id="panel-content">
      <!-- Bookmarks view -->
      <div id="panel-bookmarks" style="display:none;">
        <div id="bookmarks-list"></div>
        <div id="bookmarks-empty">No bookmarks yet. Click ☆ to save a site.</div>
      </div>
      <!-- Dev console view -->
      <div id="panel-console" style="display:none;">
        <div id="console-log"></div>
      </div>
    </div>
  </div>

  <script src="chrome.js"></script>
</body>
</html>
