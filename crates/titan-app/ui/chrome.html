<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan</title>
  <link rel="stylesheet" href="chrome.css">
</head>
<body>
  <!-- Tab strip (top, drag region) -->
  <div id="tab-strip" data-tauri-drag-region>
    <div id="tab-list" data-tauri-drag-region></div>
    <button id="btn-new-tab" title="New Tab (Cmd+T)">+</button>
  </div>

  <div id="toolbar">
    <button id="btn-back" title="Back" disabled>&#x2190;</button>
    <button id="btn-forward" title="Forward" disabled>&#x2192;</button>
    <button id="btn-refresh" title="Refresh">&#x21BB;</button>
    <div id="address-bar-container">
      <span id="scheme-badge">nsite://</span>
      <input
        id="address-bar"
        type="text"
        spellcheck="false"
        autocomplete="off"
        placeholder="enter a name or npub..."
      >
    </div>
    <button id="btn-star" title="Bookmark (Cmd+D)">&#x2606;</button>
    <button id="btn-bookmarks" title="Bookmarks">&#x2261;</button>
    <button id="btn-settings" title="Settings" style="font-size:13px;">&#x2699;</button>
    <button id="btn-console" title="Console (Cmd+Opt+K)" style="font-size:12px;display:none;">&#x2699;</button>
  </div>
  <div id="loading-bar"></div>

  <!-- Side panel -->
  <div id="side-panel" style="display:none;">
    <div id="panel-header">
      <span id="panel-title"></span>
    </div>
    <div id="panel-content">
      <!-- Bookmarks view -->
      <div id="panel-bookmarks" style="display:none;">
        <div id="bookmarks-list"></div>
        <div id="bookmarks-empty">No bookmarks yet. Click ☆ to save a site.</div>
      </div>
      <!-- Dev console view -->
      <div id="panel-console" style="display:none;">
        <div id="console-log"></div>
      </div>
      <!-- Settings view -->
      <div id="panel-settings" style="display:none;">
        <div class="settings-section">
          <label class="settings-label">Relays</label>
          <textarea id="settings-relays" class="settings-textarea" rows="3" spellcheck="false" placeholder="wss://relay.example.com"></textarea>
          <div class="settings-hint">Nostr relays for content resolution (one per line)</div>
        </div>
        <div class="settings-section">
          <label class="settings-label">Discovery Relays</label>
          <textarea id="settings-discovery" class="settings-textarea" rows="2" spellcheck="false" placeholder="wss://purplepag.es"></textarea>
          <div class="settings-hint">NIP-65 relays for relay list lookups (one per line)</div>
        </div>
        <div class="settings-section">
          <label class="settings-label">Blossom Servers</label>
          <textarea id="settings-blossom" class="settings-textarea" rows="2" spellcheck="false" placeholder="https://blossom.example.com"></textarea>
          <div class="settings-hint">Content-addressed blob storage (one per line)</div>
        </div>
        <div class="settings-section">
          <label class="settings-label">Indexer Pubkey</label>
          <input id="settings-indexer" class="settings-input" type="text" spellcheck="false" placeholder="hex pubkey">
          <div class="settings-hint">NSIT name index publisher (hex)</div>
        </div>
        <div class="settings-section">
          <label class="settings-label">Homepage</label>
          <input id="settings-homepage" class="settings-input" type="text" spellcheck="false" placeholder="titan">
          <div class="settings-hint">Default page on startup</div>
        </div>
        <div class="settings-section">
          <button id="settings-save" class="settings-btn">Save</button>
          <button id="settings-reset" class="settings-btn-secondary">Reset to Defaults</button>
        </div>
      </div>
    </div>
  </div>

  <script src="chrome.js"></script>
</body>
</html>
