<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="chrome">
    <div id="toolbar">
      <button id="btn-back" title="Back" disabled>&#x2190;</button>
      <button id="btn-forward" title="Forward" disabled>&#x2192;</button>
      <button id="btn-refresh" title="Refresh">&#x21BB;</button>
      <div id="address-bar-container">
        <span id="scheme-badge">nsite://</span>
        <input
          id="address-bar"
          type="text"
          spellcheck="false"
          autocomplete="off"
          placeholder="enter a name or npub..."
        >
      </div>
    </div>
    <div id="status-bar">
      <span id="status-text">Ready</span>
    </div>
  </div>
  <div id="content">
    <div id="welcome">
      <div id="logo">&#x25C8;</div>
      <h1>Titan</h1>
      <p class="tagline">A native browser for the Nostr web</p>
      <p class="hint">Type a name above to browse an nsite</p>
    </div>
    <iframe id="page-frame" style="display:none;"></iframe>
  </div>
  <div id="loading-overlay" style="display:none;">
    <div id="loading-spinner"></div>
    <div id="loading-text">Resolving...</div>
  </div>
  <div id="error-overlay" style="display:none;">
    <div id="error-icon">&#x26A0;</div>
    <h2 id="error-title">Not Found</h2>
    <p id="error-message"></p>
    <button id="error-dismiss">Back</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
